<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Meu Primeiro Programa...</title>
    <style>
        body {
            background-color: rgb(105, 105, 173);
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            color: rgb(243, 69, 243);

        p {

        ;

<body>
    <h1>Olá, Mundo!</h1>
    <p>Ja me livrei da maldiçao!!</p>
    <script>
        // Number.parseFloat(n) string para numeros reais
        // Number.parseInt(n) string para numeros inteiros
        // String(n)
        // n.toString() oq qureo jogar para uma string

        var n1 = Number(window.prompt('Digite um numero: ')) // string
        var n2 = Number(window.prompt('Digite outro numero: ')) // string
        var s = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} e igual a ${s}`) // concatenaçao
        // (number + number) para adiçao
        // (string + string) para concatenaçao
    </script>
</body>
